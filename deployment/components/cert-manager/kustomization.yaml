apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
- issuer.yaml
- master-cert.yaml
- workers-cert.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
- files:
  - tls.cert
  - tls.key
  name: nfd-ca-key-pair
  type: kubernetes.io/tls

patches:
- path: args.yaml
  target:
    labelSelector: app=nfd
    name: nfd.*
- path: master-mounts.yaml
  target:
    labelSelector: app=nfd
    name: nfd-master
- path: worker-mounts.yaml
  target:
    labelSelector: app=nfd
    name: nfd-worker
